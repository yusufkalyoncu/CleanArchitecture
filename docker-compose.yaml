services:
  postgres:
    image: postgres:17-alpine
    container_name: local_postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${PostgresOptions__Username}
      POSTGRES_PASSWORD: ${PostgresOptions__Password}
      POSTGRES_DB: ${PostgresOptions__Database}
    ports:
      - "5432:5432"
    volumes:
      - postgres_local_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${PostgresOptions__Username} -d ${PostgresOptions__Database}"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: local_redis
    restart: unless-stopped
    ports:
      - "6379:6379"
    healthcheck:
      test: [ "CMD", "redis-cli", "ping" ]
      interval: 5s
      timeout: 3s
      retries: 5

  seq:
    image: datalust/seq:2025.2
    container_name: local_seq
    restart: unless-stopped
    environment:
      ACCEPT_EULA: "Y"
      SEQ_FIRSTRUN_NOAUTHENTICATION: "true"
    ports:
      - "8081:80"
      - "5341:5341"
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:80/health || exit 1" ]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    container_name: local_backend
    build:
      context: .
      dockerfile: src/CleanArchitecture.WebApi/Dockerfile
    restart: unless-stopped
    ports:
      - "5005:8080"
    env_file:
      - .env
    environment:
      - ASPNETCORE_ENVIRONMENT=Development
      - PostgresOptions__Host=postgres
      - RedisOptions__Host=redis
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      seq:
        condition: service_healthy

volumes:
  postgres_local_data: